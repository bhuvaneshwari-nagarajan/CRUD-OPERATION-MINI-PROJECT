<html>
<head><title>Product Information</title>
</head>

<body>
<center>
<h1>Product INFORMATION</h1>
<table border=5px;>
<thead>
	<th>Product NO</th>
	<th>Product NAME</th>
	<th>Product QUANTITY</th>
	<th>Product PRICE</th>
	<th>ACTION</th>
</thead>
{% for x in p %}
<tr>
	<td>{{x.pno}}</td>
	<td>{{x.pname}}</td>
	<td>{{x.pquantity}}</td>
	<td>{{x.pprice}}</td>
	<td><a href="/update/{{x.id}}/">Update</a> |<a href="/delete/{{x.id}}/">Delete</a> | <a href="/insert/">Insert</a></td>

</tr>
{% endfor %}
</table>

</center>
</body>
</html>
