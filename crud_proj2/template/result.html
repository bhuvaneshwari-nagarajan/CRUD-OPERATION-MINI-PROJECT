<html>
<head><title>Grocery List</title>
</head>

<body>
<center>
<h1>GROCERY ITEMS LIST</h1>
<table border=5px;>
<thead>
	<th> NAME</th>
	<th> QUANTITY</th>
	<th> PRICE</th>
	<th>ACTION</th>
</thead>
{% for x in s %}
<tr>
	<td>{{x.name}}</td>
	<td>{{x.quantity}}</td>
	<td>{{x.price}}</td>
	<td><a href="/update/{{x.id}}/">Update</a> |<a href="/delete/{{x.id}}/">Delete</a></td>
</tr>
{% endfor %}
</table>

</center>
</body>
</html>
