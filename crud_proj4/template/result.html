{% load static %}
<html>
<head><title>BANKING INFORMATION</title>
<link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body>
<center>
<h1>BANKING INFORMATION</h1>
<table border=5px;>
<thead>
	<th>ACCOUNT NO</th>
	<th> NAME</th>
	<th>DEPOSIT </th>
	<th>BALANCE</th>
	<th>ACTION</th>
</thead>
{% for x in p %}
<tr>
	<td>{{x.account_no}}</td>
	<td>{{x.name}}</td>
	<td>{{x.deposit}}</td>
	<td>{{x.balance}}</td>
	<td><a href="/update/{{x.id}}/">Update</a> | <a href="/delete/{{x.id}}/">Delete</a> | <a href="/insert/">Insert</a></td>

</tr>
{% endfor %}
</table>

</center>
</body>
</html>
